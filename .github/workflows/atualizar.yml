name: Atualizar Painel

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: atualizar-painel
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar dados do Movidesk
        env:
          MOVIDESK_TOKEN: ${{ secrets.MOVIDESK_TOKEN }}
        run: python fetch_data.py

      - name: Gerar dashboard
        run: python build_dashboard.py

      - name: Publicar index.html
        run: |
          cp dashboard_suporte.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Atualizacao automatica $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
